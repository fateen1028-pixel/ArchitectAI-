server:
  port: 8080

spring:
  application:
    name: system-design-coach-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/learningapp}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Fartline*10b}

  jpa:
    open-in-view: false

    hibernate:
      ddl-auto: validate

    properties:
      "hibernate.format_sql": true
      "hibernate.type.json_format_mapper": org.hibernate.type.format.jackson.Jackson3JsonFormatMapper

  flyway:
    enabled: true

  ai:
    model:
      chat: google-genai

    google:
      genai:
        chat:
          model: gemini-2.5-flash
          response-mime-type: application/json
          temperature: 0.1
          max-output-tokens: 6000
          thinking-budget: 0

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

logging:
  level:
    org.hibernate.SQL: debug